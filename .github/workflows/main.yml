name: Add EternityROM Submodule

on:
  workflow_dispatch:

jobs:
  add-submodule:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.LINKIT }}

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Recreate submodule tracking fifteen
        run: |
          git submodule deinit -f EternityROM-15 || true
          git rm -f EternityROM-15 || true
          rm -rf .git/modules/EternityROM-15 || true

          git submodule add -b fifteen https://github.com/syrie414/EternityROM-15.git EternityROM-15
          git submodule update --init --remote

      - name: Commit and push
        run: |
          git add .gitmodules EternityROM-15
          git commit -m "Add EternityROM-15 submodule tracking fifteen branch" || echo "No changes"
          git push https://x-access-token:${{ secrets.LINKIT }}@github.com/${{ github.repository }} HEAD:${{ github.ref_name }}
